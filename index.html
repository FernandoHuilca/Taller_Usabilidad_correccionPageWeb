<!DOCTYPE html>
<!-- Uso del idioma español  -->
<html lang="es">
	<head>
		<!-- Hemos agregado esta metaInformación -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Registro de estudiantes</title>
		<style>
			:focus {
				outline: 3px solid #005fcc;
				outline-offset: 2px;
			}
			.boton {
				background: #005fcc;
				color: #ffffff;
				padding: 10px 12px;
				cursor: pointer;
				border: none;
				border-radius: 4px;
			}
			.menu {
				position: relative;
				display: inline-block;
			}
			summary.boton {
				list-style: none;
			}
			summary.boton::-webkit-details-marker {
				display: none;
			}
			.opciones {
				display: none;
				position: absolute;
				left: 0;
				top: 100%;
				background: #ffffff;
				box-shadow: 0 2px 6px rgba(0,0,0,0.1);
				padding: 0;
				margin: 4px 0 0 0;
				list-style: none;
				min-width: 140px;
			}
			.menu[open] .opciones {
				display: block;
			}
			.opciones a {
				display: block;
				padding: 8px 12px;
				color: #000000;
				text-decoration: none;
			}
			.opciones a:hover,
			.opciones a:focus {
				background: #f0f0f0;
			}
			input, button, a {
				font: inherit;
			}
			.pagina-navegacion {
				margin: 16px 0;
				display: flex;
				gap: 12px;
				flex-wrap: wrap;
			}
			.pagina-navegacion a {
				display: inline-block;
				padding: 10px 12px;
				border: 1px solid #005fcc;
				border-radius: 4px;
				color: #005fcc;
				text-decoration: none;
				background: #ffffff;
			}
			.pagina-navegacion a:hover,
			.pagina-navegacion a:focus {
				background: #eaf2ff;
			}

			form > div { margin-bottom: 10px; }
		</style>
	</head>
	<body>
		<h1>Registro de estudiantes</h1>

		
		<nav aria-label="Menú principal">
			<details class="menu">
				<summary class="boton">Menú</summary>
				<ul class="opciones">
					<li><a href="inicio.html">Inicio</a></li>
					<li><a href="ayuda.html">Ayuda</a></li>
				</ul>
			</details>
		</nav>
<!--  hemos agregado una desciripción alternativa para mejorar la accesibilidad de la imagen.-->
		<img src="Images\becas_info.jpeg" alt="Información sobre becas"> 

		<form aria-label="Formulario de registro de estudiantes">
			<div>
				<label for="nombre">Nombre completo</label>
				<input id="nombre" name="nombre" type="text" placeholder="Nombre completo">
			</div>
			<div>
				<label for="correo">Correo institucional</label>
				<input id="correo" name="correo" type="email" placeholder="correo@ejemplo.edu">
			</div>
			<button class="boton" type="submit">Enviar</button>
		</form>


		
		
		<nav class="pagina-navegacion" aria-label="Navegación entre páginas">
			<a href="evaluacion_page.html">Ir a la versión anterior</a>
		</nav>


	</body>
	
</html>
