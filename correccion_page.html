<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Registro de estudiantes</title>
		<style>
			:focus {
				outline: 3px solid #005fcc;
				outline-offset: 2px;
			}
			.boton {
				background: #005fcc;
				color: #ffffff;
				padding: 10px 12px;
				cursor: pointer;
				border: none;
				border-radius: 4px;
			}
			.menu {
				position: relative;
				display: inline-block;
			}
			.opciones {
				display: none;
				position: absolute;
				left: 0;
				top: 100%;
				background: #ffffff;
				box-shadow: 0 2px 6px rgba(0,0,0,0.1);
				padding: 0;
				margin: 4px 0 0 0;
				list-style: none;
				min-width: 140px;
			}
			/* Allow keyboard focus to show the menu without JS */
			.menu:focus-within .opciones {
				display: block;
			}
			.opciones a {
				display: block;
				padding: 8px 12px;
				color: #000000;
				text-decoration: none;
			}
			.opciones a:hover,
			.opciones a:focus {
				background: #f0f0f0;
			}
			input, button, a {
				font: inherit;
			}
			.pagina-navegacion {
				margin: 16px 0;
				display: flex;
				gap: 12px;
				flex-wrap: wrap;
			}
			.pagina-navegacion a {
				display: inline-block;
				padding: 10px 12px;
				border: 1px solid #005fcc;
				border-radius: 4px;
				color: #005fcc;
				text-decoration: none;
				background: #ffffff;
			}
			.pagina-navegacion a:hover,
			.pagina-navegacion a:focus {
				background: #eaf2ff;
			}
			form > div { margin-bottom: 10px; }
		</style>
	</head>
	<body>
		<h1>Registro de estudiantes</h1>

		
		<nav aria-label="Menú principal">
			<div class="menu">
				<button type="button" id="menuButton" aria-expanded="false" aria-controls="menuList">Menú</button>
				<ul id="menuList" class="opciones" role="menu" aria-hidden="true">
					<li role="none"><a role="menuitem" href="inicio.html">Inicio</a></li>
					<li role="none"><a role="menuitem" href="ayuda.html">Ayuda</a></li>
				</ul>
			</div>
		</nav>

		<img src="Images\becas_info.jpeg" alt="Información sobre becas">

		<form action="#" method="post" onsubmit="return handleSubmit(event);">
			<div>
				<label for="nombre">Nombre completo</label>
				<input id="nombre" name="nombre" type="text" placeholder="Nombre completo">
			</div>
			<div>
				<label for="correo">Correo institucional</label>
				<input id="correo" name="correo" type="email" placeholder="correo@ejemplo.edu">
			</div>
			<button class="boton" type="submit">Enviar</button>
		</form>


		
		
		<nav class="pagina-navegacion" aria-label="Navegación entre páginas">
			<a href="evaluacion_page.html">Ir a la version anterior</a>
		</nav>


		<script>
			(function(){
				const menuButton = document.getElementById('menuButton');
				const menuList = document.getElementById('menuList');

				menuButton.addEventListener('click', function(){
					const expanded = this.getAttribute('aria-expanded') === 'true';
					this.setAttribute('aria-expanded', String(!expanded));
					menuList.style.display = expanded ? 'none' : 'block';
					menuList.setAttribute('aria-hidden', String(expanded));
				});

				menuButton.addEventListener('keydown', function(e){
					if(e.key === 'ArrowDown'){
						e.preventDefault();
						const first = menuList.querySelector('a');
						if(first) first.focus();
					}
				});

				menuList.addEventListener('keydown', function(e){
					const items = Array.from(menuList.querySelectorAll('a'));
					let idx = items.indexOf(document.activeElement);
					if(e.key === 'ArrowDown'){
						e.preventDefault();
						items[(idx+1) % items.length].focus();
					} else if(e.key === 'ArrowUp'){
						e.preventDefault();
						items[(idx-1 + items.length) % items.length].focus();
					} else if(e.key === 'Escape'){
						menuButton.focus();
						menuButton.setAttribute('aria-expanded','false');
						menuList.style.display = 'none';
						menuList.setAttribute('aria-hidden','true');
					}
				});
			})();

			function handleSubmit(e){
				e.preventDefault();
				// Implementar envío real aquí. Por ahora sólo demostración.
				alert('Formulario enviado (simulado).');
				return false;
			}
		</script>
	</body>
</html>
